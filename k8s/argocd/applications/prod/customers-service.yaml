apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: customers-service-prod
  namespace: argocd
spec:
  project: petclinic-prod
  source:
    repoURL: https://github.com/Dvzr2k/agentic-petclinic-eks-platform.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: customers-service
      valueFiles:
        - ../../helm-values/customers-service.yaml
        - ../../helm-values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-prod
