apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visits-service-dev
  namespace: argocd
spec:
  project: petclinic-dev
  source:
    repoURL: https://github.com/Dvzr2k/agentic-petclinic-eks-platform.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: visits-service
      valueFiles:
        - ../../helm-values/visits-service.yaml
        - ../../helm-values/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
