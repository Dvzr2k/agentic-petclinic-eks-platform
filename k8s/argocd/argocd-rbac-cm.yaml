apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.csv: |
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, accounts, *, *, allow
    p, role:admin, certificates, *, *, allow
    p, role:admin, gpgkeys, *, *, allow
    p, role:admin, logs, get, */*, allow
    p, role:admin, exec, create, */*, allow

    # [MED-004 fix] Scoped to the petclinic-dev AppProject itself, not just
    # app names matching "*-dev". Previously "default/*-dev" only worked
    # because every Application happened to follow that naming convention —
    # a misnamed or new Application could have slipped through. Now the
    # restriction is structural: petclinic-dev Applications can only ever
    # target the petclinic-dev namespace (enforced by the AppProject), so
    # scoping RBAC to that project is a real boundary, not a naming hope.
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, sync, petclinic-dev/*, allow
    p, role:developer, logs, get, petclinic-dev/*, allow
    p, role:developer, projects, get, *, allow

    g, admin, role:admin

  # Any identity without an explicit group mapping above (e.g. a future SSO
  # user) gets developer by default — least privilege unless someone is
  # deliberately added to role:admin.
  policy.default: role:developer

  # SSO (Dex/OIDC) integration is not configured — the built-in local `admin`
  # account is the only login today. Left as an optional future enhancement.
  scopes: '[groups]'
