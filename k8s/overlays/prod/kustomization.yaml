apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-prod

resources:
  - ../../base
  - resource-quota.yaml
  - hpa.yaml
  - pdb.yaml

replicas:
  - name: config-server
    count: 2
  - name: discovery-server
    count: 2
  - name: api-gateway
    count: 2
  - name: customers-service
    count: 2
  - name: visits-service
    count: 2
  - name: vets-service
    count: 2
  - name: genai-service
    count: 1
  - name: admin-server
    count: 1

# Prod RDS is not deployed yet (E-5 prod wiring is PETPLAT-27, not yet applied).
# Swap this placeholder for the real endpoint via `terraform output rds_endpoint`
# in terraform/environments/prod once that environment exists.
patches:
  - target:
      kind: ConfigMap
      name: customers-service
    patch: |-
      - op: replace
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:mysql://REPLACE-WITH-PROD-RDS-ENDPOINT:3306/petclinic"
  - target:
      kind: ConfigMap
      name: visits-service
    patch: |-
      - op: replace
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:mysql://REPLACE-WITH-PROD-RDS-ENDPOINT:3306/petclinic"
  - target:
      kind: ConfigMap
      name: vets-service
    patch: |-
      - op: replace
        path: /data/SPRING_DATASOURCE_URL
        value: "jdbc:mysql://REPLACE-WITH-PROD-RDS-ENDPOINT:3306/petclinic"

images:
  - name: petclinic/config-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/config-server
    newTag: v1.0.0
  - name: petclinic/discovery-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/discovery-server
    newTag: v1.0.0
  - name: petclinic/customers-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/customers-service
    newTag: v1.0.0
  - name: petclinic/visits-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/visits-service
    newTag: v1.0.0
  - name: petclinic/vets-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/vets-service
    newTag: v1.0.0
  - name: petclinic/genai-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/genai-service
    newTag: v1.0.0
  - name: petclinic/api-gateway
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/api-gateway
    newTag: v1.0.0
  - name: petclinic/admin-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-prod/admin-server
    newTag: v1.0.0
