apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-dev

resources:
  - ../../base
  - resource-quota.yaml
  - limit-range.yaml

# Dev: 1 replica per service (base default) — no patches needed.
# Images rewritten from the base placeholder name to the real dev ECR repos.
# Tag is the initial manual push version; CI (E-10) updates this via helm-values
# once the build pipeline exists.
images:
  - name: petclinic/config-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/config-server
    newTag: v1.0.0
  - name: petclinic/discovery-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/discovery-server
    newTag: v1.0.0
  - name: petclinic/customers-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/customers-service
    newTag: v1.0.0
  - name: petclinic/visits-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/visits-service
    newTag: v1.0.0
  - name: petclinic/vets-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/vets-service
    newTag: v1.0.0
  - name: petclinic/genai-service
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/genai-service
    newTag: v1.0.0
  - name: petclinic/api-gateway
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/api-gateway
    newTag: v1.0.0
  - name: petclinic/admin-server
    newName: 092443461861.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/admin-server
    newTag: v1.0.0
