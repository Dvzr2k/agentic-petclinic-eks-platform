apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# [MED-001/LOW-002 fix, 4th security audit] Used to also pull in ../../base
# (the original pre-Helm per-service Deployment/Service/ConfigMap
# manifests) plus an `images:` rewrite for them. Helm + ArgoCD replaced
# that path entirely (see docs/helm-guide.md) - those manifests were never
# referenced by any ArgoCD Application and had drifted back to insecure
# defaults (readOnlyRootFilesystem: false) and a frozen v1.0.0 image tag.
# Applying this kustomization would have silently overwritten the real,
# Helm-managed Deployments with that stale, less-secure version. Deleted
# the dead manifests and this file now only carries what's still genuinely
# needed: ResourceQuota and LimitRange, which apply by namespace/name and
# aren't rendered by the Helm chart itself.
namespace: petclinic-dev

resources:
  - resource-quota.yaml
  - limit-range.yaml
