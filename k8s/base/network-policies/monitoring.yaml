# [MED-003 fix] Same default-deny + explicit allow pattern as
# petclinic-dev/prod. Requires enableNetworkPolicy on the vpc-cni addon
# (terraform/modules/eks/main.tf) to actually be enforced.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Prometheus -> Alertmanager, Grafana -> Prometheus/Loki, FluentBit -> Loki:
# all plain intra-namespace calls between the 5 observability components.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Prometheus scrapes app pods in both environments plus Zipkin's own
# metrics endpoint in the tracing namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: petclinic-dev
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: petclinic-prod
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tracing
---
# Alertmanager emails alerts out through a real SMTP server on the
# internet (see MED-002 — smtp_auth_password_file).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager-smtp-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes: ["Egress"]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: ["10.0.0.0/16", "10.1.0.0/16"]
      ports:
        - protocol: TCP
          port: 587
