# Apply only to the prod EKS cluster, never to dev's — same object name
# as dev/alertmanager-smtp.yaml, since each lives on its own separate
# cluster with its own "monitoring" namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-smtp
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/component: infrastructure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-smtp
  data:
    - secretKey: smtp-host
      remoteRef:
        key: petclinic/prod/alertmanager-smtp
        property: smtp-host
    - secretKey: smtp-username
      remoteRef:
        key: petclinic/prod/alertmanager-smtp
        property: smtp-username
    - secretKey: smtp-password
      remoteRef:
        key: petclinic/prod/alertmanager-smtp
        property: smtp-password
