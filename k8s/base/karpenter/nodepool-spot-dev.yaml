# Apply this file AFTER the Graviton free trial expires to enable Spot
# savings. Do not merge this into nodepool.yaml — kept as a separate,
# explicit file so switching to Spot is a deliberate action, not something
# that happens by accident when nodepool.yaml gets edited for other reasons.
#
# Same structure as nodepool.yaml, only the capacity-type requirement
# differs: this allows Karpenter to choose spot OR on-demand per node,
# picking whichever is available/cheapest at provisioning time.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t4g.small", "t4g.medium"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
  limits:
    cpu: "8"
    memory: 32Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
