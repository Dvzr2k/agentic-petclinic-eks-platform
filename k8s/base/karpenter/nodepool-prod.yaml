# Prod copy of nodepool.yaml — that file's own header comment documents it
# as dev-specific (literal "petclinic-dev" strings, no {env} templating
# since this is plain YAML applied via kubectl, not Helm). This file is
# the same NodePool/EC2NodeClass pair with petclinic-prod substituted in
# the discovery tags and instanceProfile name.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t4g.small", "t4g.medium"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
  limits:
    # REQUIRED — without a cap, Karpenter has no upper bound and could
    # provision far more nodes than intended for a single large workload.
    cpu: "8"
    memory: 32Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  # These tags must exist on the actual VPC subnets/security groups (added in
  # terraform/modules/vpc/) — if missing, Karpenter finds no matching network
  # resources and node provisioning fails silently, with no error surfaced
  # anywhere obvious.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: petclinic-prod
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: petclinic-prod
  # Must match exactly what terraform/modules/karpenter/ creates — a mismatch
  # means the node launches in EC2 but its kubelet can never authenticate to
  # join the cluster.
  instanceProfile: petclinic-prod-karpenter-node-profile
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
