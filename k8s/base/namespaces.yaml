# Applied directly (kubectl apply -f k8s/base/namespaces.yaml), not through the
# overlay kustomizations — Kustomize's namespace: transformer renames Namespace
# objects themselves, so pulling both cluster-scoped namespaces through a
# per-env overlay collides them into one name.
apiVersion: v1
kind: Namespace
metadata:
  name: petclinic-dev
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    environment: dev
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: petclinic-prod
  labels:
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    environment: prod
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
