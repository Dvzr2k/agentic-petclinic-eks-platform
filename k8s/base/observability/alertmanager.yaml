# [MED-002 fix] The Secret that used to live here (hardcoded SMTP
# host/username/password, committed to git) is gone. It now comes from
# ExternalSecret k8s/base/external-secrets/{dev,prod}/alertmanager-smtp.yaml,
# fed by terraform/modules/secrets/main.tf — same pattern as Grafana's
# admin credentials. Still placeholder values by default (no real mail
# server configured), same status quo as before — the fix is the flow,
# not the current value.
#
# smtp_smarthost/smtp_auth_username stay inline below since Alertmanager
# has no *_file variant for those fields, and a host/username alone (no
# password) isn't meaningfully exploitable. Only smtp_auth_password_file
# is used, reading the real secret from a mounted file instead of ever
# appearing as text in this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: petclinic
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: "smtp.placeholder-not-configured.example:587"
      smtp_from: "alerts@petclinic.local"
      smtp_auth_username: "placeholder@example.com"
      smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password

    route:
      receiver: default-receiver
      group_by: ["alertname", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: default-receiver
          group_wait: 10s
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: default-receiver
          group_interval: 5m

    receivers:
      - name: default-receiver
        email_configs:
          - to: "oncall@petclinic.local"
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/part-of: petclinic
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: smtp-secret
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: smtp-secret
          secret:
            secretName: alertmanager-smtp
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: petclinic
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
