# Dashboards scoped to the 5 services Prometheus actually scrapes
# (api-gateway, customers-service, visits-service, vets-service,
# genai-service) — config-server/discovery-server/admin-server have no
# /actuator/prometheus endpoint, so a dashboard for them would only ever
# show "No Data". Spec's "Per-Service x8" is adjusted to x5 for this reason.
#
# [CRIT-001 fix] Grafana admin credentials no longer live here. They flow
# through Secrets Manager -> ExternalSecret -> K8s Secret instead — see
# terraform/modules/secrets/main.tf (random_password.grafana_admin) and
# k8s/base/external-secrets/grafana-admin.yaml. The ExternalSecret creates a
# K8s Secret named "grafana-admin" in this namespace, which the Deployment
# below already references — apply external-secrets/grafana-admin.yaml
# before this file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: petclinic
        orgId: 1
        folder: PetClinic
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
