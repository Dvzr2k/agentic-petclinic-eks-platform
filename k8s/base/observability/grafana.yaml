data:
  overview.json: |
    {
      "uid": "petclinic-overview",
      "title": "PetClinic \u2014 Service Overview",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Services Up/Down",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "up{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Requests Per Second (all services)",
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Rate (all services)",
          "gridPos": {
            "x": 12,
            "y": 6,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\",status=~\"5..\"}[5m])) by (job) / sum(rate(http_server_requests_seconds_count{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
